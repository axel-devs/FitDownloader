<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FitDownloader</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 13px;
        margin: 0;
        min-width: 420px;
        max-width: 780px;
        background: #0d0d10;
        color: #f5f5f5;
      }

      #app {
        padding: 8px 10px 10px;
      }

      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      #title {
        font-size: 14px;
        font-weight: 600;
      }

      .icon-button {
        border: none;
        background: transparent;
        color: #f78da7;
        cursor: pointer;
        padding: 2px 4px;
        font-size: 17px; /* ~20% larger than before */
      }

      .icon-button[hidden] {
        display: none;
      }

      #status {
        margin: 4px 0 8px;
        font-size: 12px;
        color: #c0c0d0;
      }

      #files-container {
        max-height: 260px;
        overflow-y: auto;
        border-radius: 6px;
        padding: 6px;
        background: #15151c;
        border: 1px solid #282838;
      }

      .file-row {
        display: flex;
        align-items: center;
        margin-bottom: 2px;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
        transition: background 0.12s ease, border-color 0.12s ease;
        border-left: 3px solid transparent;
      }

      .file-row:hover {
        background: #1c1c28;
      }

      .file-row.highlighted {
        background: #1f1b30;
        border-left-color: #f78da7;
      }

      .file-row.highlighted:hover {
        background: #28213d;
      }

      .file-row input[type="checkbox"] {
        flex-shrink: 0;
        cursor: pointer;
        accent-color: #f78da7;
      }

      .file-row label {
        flex: 1;
        margin-left: 6px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .file-status {
        font-size: 11px;
        margin-left: 6px;
        opacity: 0.8;
      }

      .status-queued {
        color: #9e9eaf;
      }
      .status-downloading {
        color: #fdd835;
      }
      .status-completed {
        color: #81c784;
      }
      .status-error {
        color: #e57373;
      }
      .status-paused {
        color: #ffeb3b;
      }
      .status-cancelled {
        color: #9e9eaf;
      }

      #controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }

      button {
        padding: 4px 10px;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid #f78da7;
        background: #f78da7;
        color: #0b0b10;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #concurrency-info {
        font-size: 11px;
        color: #f78da7;
        text-align: right;
        margin-top: 4px;
      }

      #select-all-row {
        display: flex;
        align-items: center;
        margin-bottom: 4px;
        font-weight: 600;
      }

      #select-all-row[hidden] {
        display: none;
      }

      #select-all-row label {
        margin-left: 4px;
      }

      a {
        color: #f78da7;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Views */
      #view-settings {
        display: none;
      }

      body[data-view="settings"] #view-main {
        display: none;
      }

      body[data-view="settings"] #view-settings {
        display: block;
      }

      body[data-view="settings"] #back-button {
        visibility: visible;
      }

      body[data-view="settings"] #settings-button {
        visibility: hidden;
      }

      #settings-button {
        visibility: visible;
      }

      #back-button {
        visibility: hidden;
      }

      .settings-group {
        margin-top: 6px;
        font-size: 13px;
      }

      .settings-group label {
        display: inline-block;
        margin-bottom: 4px;
      }

      .settings-group input[type="number"] {
        width: 80px;
        padding: 3px;
        border-radius: 3px;
        border: 1px solid #39495a;
        background: #111117;
        color: #f5f5ff;
      }

      #settings-status {
        margin-top: 6px;
        font-size: 11px;
        color: #f78da7;
      }

      .btn-danger {
        background: #e53935;
        border-color: #e53935;
        color: #ffffff;
      }

      .btn-warning {
        background: #fdd835;
        border-color: #fdd835;
        color: #1b1b1b;
      }

      .btn-success {
        background: #43a047;
        border-color: #43a047;
        color: #ffffff;
      }

      #files-container::-webkit-scrollbar {
        width: 6px;
      }

      #files-container::-webkit-scrollbar-track {
        background: #15151c;
      }

      #files-container::-webkit-scrollbar-thumb {
        background: #3a3a4a;
        border-radius: 3px;
      }

      #files-container::-webkit-scrollbar-thumb:hover {
        background: #5a5a6a;
      }

      #selection-info {
        font-size: 11px;
        color: #9e9eaf;
        margin-top: 4px;
        min-height: 14px;
      }

      #active-controls {
        display: none;
        gap: 6px;
        align-items: center;
      }

      #active-controls.visible {
        display: flex;
      }
    </style>
  </head>
  <body data-view="main">
    <div id="app">
      <div id="header">
        <button id="back-button" class="icon-button" title="Back">
          ←
        </button>
        <span id="title">FitDownloader</span>
        <button id="settings-button" class="icon-button" title="Settings">
          ⚙
        </button>
      </div>

      <div id="game-title" style="font-size: 12px; color: #f78da7; margin-bottom: 4px; display: none;"></div>

      <div id="view-main">
        <div id="status">Scanning current tab for FuckingFast links…</div>

        <div id="files-container">
          <div id="select-all-row" hidden>
            <input type="checkbox" id="select-all" checked />
            <label for="select-all">Select all</label>
          </div>
          <div id="files-list"></div>
        </div>

        <div id="selection-info"></div>

        <div id="controls">
          <button id="start-button" disabled>Start downloads</button>
          <div id="active-controls">
            <button id="pause-resume-button" class="btn-warning">Pause</button>
            <button id="cancel-button" class="btn-danger">Cancel</button>
          </div>
          <button id="retry-button" style="display:none">Retry failed</button>
        </div>

        <div id="concurrency-info"></div>
      </div>

      <div id="view-settings">
        <div class="settings-group">
          <label for="concurrency-input">
            Maximum concurrent downloads (1–20):
          </label>
          <br />
          <input
            type="number"
            id="concurrency-input"
            min="1"
            max="20"
            step="1"
          />
        </div>

        <div style="margin-top: 8px">
          <button id="save-settings-button">Save</button>
        </div>

        <div id="settings-status"></div>

        <div class="settings-group" style="margin-top: 10px">
          <span style="font-size: 11px; color: #b0b0c0">
            For a true one-click experience without save dialogs, turn off
            Chrome's
            <strong>"Ask where to save each file before downloading"</strong>
            setting. The extension cannot override that browser-wide option.
          </span>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
